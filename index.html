<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIVER | 수익 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root {
    --bg: #0f0f12;
    --surface: #1a1a20;
    --surface2: #22222a;
    --border: #2e2e38;
    --accent: #a07850;
    --accent2: #c49a6c;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --text-dim: #9898b0;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,15,18,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
  }
  .logo { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--accent2); letter-spacing: 2px; }
  .logo span { color: var(--text-muted); font-size: 12px; margin-left: 8px; }

  /* SUMMARY CARDS */
  .summary {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    padding: 24px 24px 0;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
  }
  .card-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .card-value { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; }
  .card-value.total { color: var(--text); }
  .card-value.done { color: var(--text); }
  .card-value.pending { color: var(--yellow); }
  .card-value.unpaid { color: var(--red); }
  .card-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  /* CONTROLS */
  .controls {
    display: flex; gap: 10px; align-items: center;
    padding: 20px 24px 12px;
    flex-wrap: wrap;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit; font-size: 13px;
    padding: 9px 14px 9px 36px;
    outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .icon {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 14px; pointer-events: none;
  }
  select, .btn-filter {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit; font-size: 13px;
    padding: 9px 14px;
    outline: none; cursor: pointer;
    transition: border-color .2s;
  }
  select:focus, .btn-filter:focus { border-color: var(--accent); }
  .filter-tabs { display: flex; gap: 6px; }
  .tab {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 12px; font-family: inherit; cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .tab.active { background: var(--accent); border-color: var(--accent); color: white; }
  .tab:hover:not(.active) { border-color: var(--accent); color: var(--accent2); }

  /* TABLE */
  .table-wrap {
    padding: 0 24px 40px;
    overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr {
    border-bottom: 1px solid var(--border);
  }
  th {
    text-align: left;
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .8px;
    padding: 12px 14px;
    font-weight: 500;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  th:hover { color: var(--text-dim); }
  th .sort-arrow { margin-left: 4px; opacity: 0.4; }
  th.sorted .sort-arrow { opacity: 1; color: var(--accent2); }
  tbody tr {
    border-bottom: 1px solid rgba(46,46,56,0.5);
    transition: background .15s;
  }
  tbody tr:hover { background: var(--surface); }
  td {
    padding: 11px 14px;
    font-size: 13px;
    white-space: nowrap;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  td.no { color: var(--text-muted); font-family: 'DM Mono', monospace; font-size: 12px; }
  td.client { font-weight: 500; color: var(--text); max-width: 180px; }
  td.month { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-dim); }
  td.amount { font-family: 'DM Mono', monospace; text-align: right; }
  td.amount.fee { color: var(--blue); }
  td.amount.share { color: var(--accent2); }

  /* BADGES */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 500;
    white-space: nowrap;
  }
  .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .badge.done { background: rgba(74,222,128,.12); color: var(--green); }
  .badge.done::before { background: var(--green); }
  .badge.unpaid { background: rgba(248,113,113,.12); color: var(--red); }
  .badge.unpaid::before { background: var(--red); }
  .badge.pending { background: rgba(251,191,36,.12); color: var(--yellow); }
  .badge.pending::before { background: var(--yellow); }
  .badge.na { background: rgba(107,107,128,.1); color: var(--text-muted); }
  .badge.na::before { background: var(--text-muted); }

  /* NOTE */
  .note-chip {
    font-size: 11px; color: var(--yellow);
    background: rgba(251,191,36,.1);
    border-radius: 4px; padding: 2px 7px;
    display: inline-block; max-width: 140px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* EMPTY */
  .empty {
    text-align: center; padding: 60px;
    color: var(--text-muted); font-size: 13px;
  }

  /* PAGINATION */
  .pagination {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    font-size: 12px; color: var(--text-muted);
  }
  .page-btns { display: flex; gap: 6px; }
  .page-btn {
    padding: 5px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    cursor: pointer; font-size: 12px;
    transition: all .2s;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent2); }
  .page-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .page-btn:disabled { opacity: 0.3; cursor: default; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 1000;
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 32px;
    min-width: 380px; max-width: 480px;
    width: 90%;
    animation: modalIn .2s ease;
  }
  @keyframes modalIn { from { transform: scale(.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: var(--text); }
  .modal-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .modal-row:last-of-type { border-bottom: none; }
  .modal-key { font-size: 12px; color: var(--text-muted); flex-shrink: 0; margin-right: 12px; }
  .modal-val { font-size: 13px; color: var(--text); text-align: right; word-break: keep-all; }
  .modal-close {
    margin-top: 20px;
    width: 100%; padding: 10px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text-muted);
    cursor: pointer; font-family: inherit; font-size: 13px;
    transition: all .2s;
  }
  .modal-close:hover { background: var(--border); color: var(--text); }

  .btn-add {
    padding: 9px 18px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: white;
    font-family: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: background .2s;
    white-space: nowrap;
  }
  .btn-add:hover { background: var(--accent2); }

  .btn-complete {
    width: 100%; margin-top: 12px; padding: 11px;
    background: rgba(74,222,128,.12);
    border: 1px solid var(--green);
    border-radius: 8px;
    color: var(--green);
    font-family: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .2s;
  }
  .btn-complete:hover { background: rgba(74,222,128,.25); }
  .btn-complete.share {
    background: rgba(167,139,250,.12);
    border-color: var(--accent2);
    color: var(--accent2);
    margin-top: 8px;
  }
  .btn-complete.share:hover { background: rgba(167,139,250,.25); }

  .btn-undo {
    width: 100%; margin-top: 12px; padding: 11px;
    background: rgba(107,107,128,.1);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-family: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .2s;
  }
  .btn-undo:hover { background: rgba(248,113,113,.12); border-color: var(--red); color: var(--red); }
  .btn-undo.share { margin-top: 8px; }

  /* ADD MODAL */
  .add-modal { min-width: 400px; max-width: 500px; }
  .form-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .form-row label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .8px; }
  .form-row input, .form-row select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: inherit; font-size: 13px;
    padding: 9px 12px;
    outline: none;
    transition: border-color .2s;
  }
  .form-row input:focus, .form-row select:focus { border-color: var(--accent); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn-submit {
    width: 100%; padding: 11px;
    background: var(--accent);
    border: none; border-radius: 8px;
    color: white; font-family: inherit; font-size: 14px; font-weight: 500;
    cursor: pointer; margin-top: 6px;
    transition: background .2s;
  }
  .btn-submit:hover { background: var(--accent2); }
  .new-badge { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); margin-left: 5px; vertical-align: middle; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .page-tabs { display:flex; gap:8px; width:100%; }
  .ptab {
    flex:1; padding:8px 0; border-radius:8px;
    border:1px solid var(--border); background:transparent;
    color:var(--text-dim); font-family:inherit; font-size:13px; cursor:pointer;
    transition:all .2s;
  }
  .ptab.active { background:var(--accent); border-color:var(--accent); color:white; }
  .ptab:hover:not(.active) { border-color:var(--accent); color:var(--accent2); }

  @media (max-width: 768px) {
    .summary { grid-template-columns: repeat(2, 1fr); }
    header { flex-wrap: wrap; }
    .card-value { font-size: 15px; }
    .card-label { font-size: 10px; }
    .card-sub { font-size: 10px; }
    .tab { font-size: 11px; padding: 6px 10px; }
    td { font-size: 11px; padding: 8px 10px; }
    th { font-size: 10px; padding: 10px 10px; }
    .badge { font-size: 10px; padding: 2px 7px; }
  }

  

  
</style>
</head>

    <div class="form-row">
      <label>클라이언트ㅣ프로젝트</label>
      <input type="text" id="addClient" placeholder="예: 루아베ㅣ여름침구">
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>연도</label>
        <select id="addYear">
          <option value="23">2023</option>
          <option value="24">2024</option>
          <option value="25" selected>2025</option>
          <option value="26">2026</option>
        </select>
      </div>
      <div class="form-row">
        <label>월</label>
        <select id="addMonth">
          <option>1월</option><option>2월</option><option>3월</option>
          <option>4월</option><option>5월</option><option>6월</option>
          <option>7월</option><option>8월</option><option>9월</option>
          <option>10월</option><option>11월</option><option>12월</option>
        </select>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>제작비 (VAT포함)</label>
        <input type="number" id="addFee" placeholder="0">
      </div>
      <div class="form-row">
        <label>수익쉐어 확정금액</label>
        <input type="number" id="addShare" placeholder="0">
      </div>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>입금 상태</label>
        <select id="addPayment">
          <option value="완료">완료</option>
          <option value="미입금">미입금</option>
          <option value="예정">입금 예정</option>
        </select>
      </div>
      <div class="form-row">
        <label>수익쉐어 입금</label>
        <select id="addShareStatus">
          <option value="해당없음">해당없음</option>
          <option value="완료">완료</option>
          <option value="기타">입금 예정</option>
        </select>
      </div>
    </div>
    <div class="form-row" style="margin-top:4px">
      <label>선금 / 잔금 (선택 · 나눠서 받는 경우만)</label>
      <div class="form-grid">
        <input type="number" id="addDeposit" placeholder="선금액 (0이면 미사용)">
        <input type="number" id="addBalance" placeholder="잔금액 (0이면 미사용)">
      </div>
    </div>
    <button class="btn-submit" onclick="submitAdd()">추가하기</button>
    <button class="modal-close" style="margin-top:8px" onclick="closeAddModal()">취소</button>
  </div>
</div>

<!-- 상세 모달 -->
<div class="modal-overlay" id="modalOverlay">

    <div class="modal-title" id="modalTitle">상세 정보</div>
    <div id="modalBody"></div>
    <button class="modal-close" onclick="closeModal()">닫기</button>
  </div>
</div>

function fmt(n) {
  if (!n) return '-';
  return n.toLocaleString() + '원';
}
function fmtFull(n) {
  if (!n) return '-';
  return n.toLocaleString() + '원';
}

function badgeHtml(status) {
  if (status === '완료') return `<span class="badge done">완료</span>`;
  if (status === '미입금') return `<span class="badge unpaid">미입금</span>`;
  if (status === '예정') return `<span class="badge pending">입금 예정</span>`;
  if (status === '미수금') return `<span class="badge unpaid">미수금</span>`;
  if (status === '해당없음') return `<span class="badge na">해당없음</span>`;
  if (status === '선금완료') return `<span class="badge pending">선금완료</span>`;
  return `<span class="badge na">${status}</span>`;
}

function renderSummary() {
  const total = RAW.length;
  const unpaid = RAW.filter(r => r.paymentStatus === '미입금' || r.paymentStatus === '예정' || r.paymentStatus === '선금완료').length;
  const unpaidAmt = RAW.filter(r => r.paymentStatus === '미입금' || r.paymentStatus === '예정' || r.paymentStatus === '선금완료').reduce((s,r) => {
    // 선금 완료된 경우 잔금만 계산
    if (r.depositPaid && !r.balancePaid && r.balance) return s + r.balance;
    return s + r.fee;
  }, 0);
  const shareUnpaid = RAW.filter(r => (r.shareStatus === '미수금' || r.shareStatus === '기타') && r.no !== 170 && r.no !== 250);
  const shareUnpaidAmt = shareUnpaid.reduce((s,r) => s+r.shareAmount, 0);

  // 누적 매출 (제작비 + 수익쉐어 전체)
  const totalFee = RAW.reduce((s,r) => s+r.fee, 0);
  const totalShare = RAW.reduce((s,r) => s+r.shareAmount, 0);
  const totalRevenue = totalFee + totalShare;

  // 당월 매출
  const now = new Date();
  const curYear = String(now.getFullYear()).slice(2);
  const curMonth = (now.getMonth()+1) + '월';
  const thisMonth = RAW.filter(r => getYear(r.no) === curYear && r.month === curMonth);
  const thisMonthRevenue = thisMonth.reduce((s,r) => s+r.fee+r.shareAmount, 0);

  document.getElementById('summaryCards').innerHTML = `
    <div class="card">
      <div class="card-label">총 건수</div>
      <div class="card-value total">${total}건</div>
      <div class="card-sub">2023.04 ~ 2026.04</div>
    </div>
    <div class="card">
      <div class="card-label">기버 누적 매출</div>
      <div class="card-value" style="color:var(--text)">${fmt(totalRevenue)}</div>
      <div class="card-sub">제작비 + 수익쉐어</div>
    </div>
    <div class="card">
      <div class="card-label">당월 매출 ('${curYear} ${curMonth})</div>
      <div class="card-value" style="color:var(--accent2)">${fmt(thisMonthRevenue)}</div>
      <div class="card-sub">${thisMonth.length}건</div>
    </div>
    <div class="card">
      <div class="card-label">제작비 입금예정</div>
      <div class="card-value unpaid">${unpaid}건 · ${fmt(unpaidAmt)}</div>
    </div>
    <div class="card">
      <div class="card-label">수익쉐어 입금예정</div>
      <div class="card-value pending">${shareUnpaid.length}건 · ${fmt(shareUnpaidAmt)}</div>
    </div>
    <div class="card" style="grid-column:1/-1;border-color:var(--accent);background:rgba(160,120,80,0.08)">
      <div class="card-label">총합</div>
      <div class="card-value" style="color:var(--accent2)">${fmt(unpaidAmt + shareUnpaidAmt)}</div>
    </div>
  `;
}

function renderMonthFilter() {
  const sel = document.getElementById('monthFilter');
  const source = activeYear ? RAW.filter(r => getYear(r.no) === activeYear) : RAW;
  const months = [...new Set(source.map(r => r.month))];
  const order = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  months.sort((a,b) => {
    const ai = order.indexOf(a);
    const bi = order.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });
  sel.innerHTML = '<option value="">전체 월</option>' + months.map(m => `<option value="${m}">${m}</option>`).join('');
  sel.selectedIndex = 0;
  activeMonth = '';
}

function applyFilters() {
  filtered = RAW.filter(r => {
    const matchSearch = !searchQ || r.client.toLowerCase().includes(searchQ.toLowerCase());
    const matchYear = !activeYear || getYear(r.no) === activeYear;
    const matchMonth = !activeMonth || r.month === activeMonth;
    let matchFilter = true;
    if (activeFilter === '미완료') matchFilter = r.paymentStatus === '미입금' || r.paymentStatus === '예정' || r.paymentStatus === '선금완료' || r.shareStatus === '미수금';
    else if (activeFilter === '완료') matchFilter = r.paymentStatus === '완료';
    else if (activeFilter === '쉐어미입금') matchFilter = (r.shareStatus === '미수금' || r.shareStatus === '기타') && r.no !== 170 && r.no !== 250;
    return matchSearch && matchYear && matchMonth && matchFilter;
  });

  // sort
  filtered.sort((a,b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'month') { va = monthOrder[va] || 99; vb = monthOrder[vb] || 99; }
    if (typeof va === 'string') return va.localeCompare(vb) * sortDir;
    return (va - vb) * sortDir;
  });

  currentPage = 1;
  renderTable();
  renderPagination();
}

function getYear(no) {
  if (no <= 76) return '23';
  if (no <= 195) return '24';
  if (no <= 345) return '25';
  return '26';
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyMsg');
  const start = (currentPage - 1) * PER_PAGE;
  const rows = filtered.slice(start, start + PER_PAGE);

  if (!rows.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = rows.map(r => {
    const ps = (activeFilter === '쉐어미입금') ? '미입금' : (r.paymentStatus === '완료' ? '완료' : '미입금');
    const showFee = activeFilter !== '쉐어미입금';
    const yearMonth = `'${getYear(r.no)} ${r.month}`;
    return `
    <tr onclick="openModal(${r.no})" style="cursor:pointer">
      <td class="no">${r.no}</td>
      <td class="client">${r.client.replace(/_x0008_/g,'').replace(/\n/g,' ')}</td>
      <td class="month">${yearMonth}</td>
      ${showFee ? `<td class="amount fee">${fmt(r.fee)}</td>` : ''}
      <td class="amount share">${r.shareAmount ? fmt(r.shareAmount) : '<span style="color:var(--text-muted)">-</span>'}</td>
      <td>${badgeHtml(ps)}</td>
      ${activeFilter !== '쉐어미입금' ? `<td>${badgeHtml(r.shareStatus)}</td>` : ''}
    </tr>
  `}).join('');

  document.getElementById('thFee').style.display = activeFilter === '쉐어미입금' ? 'none' : '';
  document.getElementById('thShareStatus').style.display = activeFilter === '쉐어미입금' ? 'none' : '';

  // update sort headers
  document.querySelectorAll('th[data-col]').forEach(th => {
    th.classList.toggle('sorted', th.dataset.col === sortCol);
    const arrow = th.querySelector('.sort-arrow');
    if (arrow && th.dataset.col === sortCol) arrow.textContent = sortDir === 1 ? '↑' : '↓';
    else if (arrow) arrow.textContent = '↕';
  });
}

function renderPagination() {
  const total = filtered.length;
  const pages = Math.ceil(total / PER_PAGE);
  const pag = document.getElementById('pagination');
  if (pages <= 1) { pag.innerHTML = `<span>${total}건 표시 중</span>`; return; }

  let btns = '';
  const max = 7;
  let start = Math.max(1, currentPage - 3);
  let end = Math.min(pages, start + max - 1);
  if (end - start < max - 1) start = Math.max(1, end - max + 1);

  for (let i = start; i <= end; i++) {
    btns += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }

  pag.innerHTML = `
    <span>${(currentPage-1)*PER_PAGE+1}–${Math.min(currentPage*PER_PAGE,total)} / 총 ${total}건</span>
    <div class="page-btns">
      <button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>
      ${btns}
      <button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button>
    </div>
  `;
}

function goPage(p) {
  const pages = Math.ceil(filtered.length / PER_PAGE);
  if (p < 1 || p > pages) return;
  currentPage = p;
  renderTable();
  renderPagination();
}

function openModal(no) {
  const r = RAW.find(x => x.no === no);
  if (!r) return;
  document.getElementById('modalTitle').textContent = r.client.replace(/_x0008_/g,'').replace(/\n/g,' ');

  // 선금/잔금 섹션
  const hasDeposit = r.deposit || r.balance;
  const depositSection = hasDeposit ? `
    <div class="modal-row" style="flex-direction:column;align-items:flex-start;gap:8px">
      <span class="modal-key">선금 / 잔금</span>
      <div style="display:flex;gap:8px;width:100%">
        <div style="flex:1;background:var(--surface2);border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">선금</div>
          <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--blue)">${r.deposit ? fmtFull(r.deposit) : '-'}</div>
          ${r.depositPaid
            ? `<div style="margin-top:6px"><span class="badge done" style="font-size:10px">입금완료</span></div>`
            : `<button class="btn-complete" style="margin-top:6px;padding:5px;font-size:11px" onclick="markDepositPaid(${r.no},'deposit')">✅ 선금 완료</button>`
          }
        </div>
        <div style="flex:1;background:var(--surface2);border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">잔금</div>
          <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--blue)">${r.balance ? fmtFull(r.balance) : '-'}</div>
          ${r.balancePaid
            ? `<div style="margin-top:6px"><span class="badge done" style="font-size:10px">입금완료</span></div>`
            : `<button class="btn-complete" style="margin-top:6px;padding:5px;font-size:11px" onclick="markDepositPaid(${r.no},'balance')">✅ 잔금 완료</button>`
          }
        </div>
      </div>
    </div>
  ` : '';

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-row"><span class="modal-key">No</span><span class="modal-val">${r.no}</span></div>
    <div class="modal-row"><span class="modal-key">납품월</span><span class="modal-val">'${getYear(r.no)} ${r.month}</span></div>
    <div class="modal-row"><span class="modal-key">제작비 (VAT포함)</span><span class="modal-val" style="color:var(--blue)">${fmtFull(r.fee)}</span></div>
    <div class="modal-row"><span class="modal-key">수익쉐어 확정금액</span><span class="modal-val" style="color:var(--accent2)">${fmtFull(r.shareAmount)}</span></div>
    <div class="modal-row"><span class="modal-key">입금 상태</span><span class="modal-val">${badgeHtml(r.paymentStatus)}</span></div>
    <div class="modal-row"><span class="modal-key">수익쉐어 입금</span><span class="modal-val">${badgeHtml(r.shareStatus)}</span></div>
    ${depositSection}
    ${(r.paymentStatus === '미입금' || r.paymentStatus === '예정') ? `
      <button class="btn-complete" onclick="markPaid(${r.no}, 'payment')">✅ 제작비 입금 완료 처리</button>
    ` : r.paymentStatus === '완료' ? `
      <button class="btn-undo" onclick="markUnpaid(${r.no}, 'payment')">↩ 제작비 입금 완료 취소</button>
    ` : ''}
    ${(r.shareStatus === '기타' || r.shareStatus === '미수금') ? `
      <button class="btn-complete share" onclick="markPaid(${r.no}, 'share')">✅ 수익쉐어 입금 완료 처리</button>
    ` : r.shareStatus === '완료' ? `
      <button class="btn-undo share" onclick="markUnpaid(${r.no}, 'share')">↩ 수익쉐어 입금 완료 취소</button>
    ` : ''}
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn-complete" style="background:rgba(96,165,250,.12);border-color:var(--blue);color:var(--blue)" onclick="openEditModal(${r.no})">✏️ 수정</button>
      <button class="btn-complete" style="background:rgba(248,113,113,.12);border-color:var(--red);color:var(--red)" onclick="deleteEntry(${r.no})">🗑️ 삭제</button>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('show');
}
function deleteEntry(no) {
  if (!confirm('이 항목을 삭제할까요?')) return;
  const idx = RAW.findIndex(x => x.no === no);
  if (idx !== -1) RAW.splice(idx, 1);
  // localStorage에서도 제거 (새로 추가한 항목)
  const added = loadAdded().filter(x => x.no !== no);
  saveAdded(added);
  // 기존 항목 삭제는 deleted 목록으로 관리
  const deleted = JSON.parse(localStorage.getItem('giver_deleted') || '[]');
  deleted.push(no);
  localStorage.setItem('giver_deleted', JSON.stringify(deleted));
  closeModal();
  renderSummary();
  applyFilters();
}

function openEditModal(no) {
  const r = RAW.find(x => x.no === no);
  if (!r) return;
  closeModal();
  document.getElementById('addClient').value = r.client;
  document.getElementById('addYear').value = getYear(r.no);
  document.getElementById('addMonth').value = r.month;
  document.getElementById('addFee').value = r.fee || '';
  document.getElementById('addShare').value = r.shareAmount || '';
  document.getElementById('addPayment').value = r.paymentStatus === '완료' ? '완료' : r.paymentStatus === '예정' ? '예정' : '미입금';
  document.getElementById('addShareStatus').value = r.shareStatus === '완료' ? '완료' : r.shareStatus === '기타' ? '기타' : '해당없음';
  document.getElementById('addDeposit').value = r.deposit || '';
  document.getElementById('addBalance').value = r.balance || '';
  document.getElementById('addModalOverlay').classList.add('show');
  // 수정 모드 표시
  document.querySelector('.btn-submit').textContent = '수정하기';
  document.querySelector('.btn-submit').onclick = () => submitEdit(no);
}

function submitEdit(no) {
  const r = RAW.find(x => x.no === no);
  if (!r) return;
  r.client = document.getElementById('addClient').value.trim();
  r.month = document.getElementById('addMonth').value;
  r.fee = parseInt(document.getElementById('addFee').value) || 0;
  r.shareAmount = parseInt(document.getElementById('addShare').value) || 0;
  r.paymentStatus = document.getElementById('addPayment').value;
  r.shareStatus = document.getElementById('addShareStatus').value;
  r._year = document.getElementById('addYear').value;
  const dep = parseInt(document.getElementById('addDeposit').value) || 0;
  const bal = parseInt(document.getElementById('addBalance').value) || 0;
  if (dep || bal) { r.deposit = dep; r.balance = bal; if (!r.depositPaid) r.depositPaid = false; if (!r.balancePaid) r.balancePaid = false; }
  else { delete r.deposit; delete r.balance; }

  // localStorage 업데이트 (새로 추가 항목이면 added에, 기존 항목이면 overrides에)
  const added = loadAdded();
  const addedIdx = added.findIndex(x => x.no === no);
  if (addedIdx !== -1) {
    added[addedIdx] = r;
    saveAdded(added);
  } else {
    // 기존 항목 수정값 저장
    const overrides = JSON.parse(localStorage.getItem('giver_overrides') || '{}');
    overrides[no] = r;
    localStorage.setItem('giver_overrides', JSON.stringify(overrides));
  }

  closeAddModal();
  document.querySelector('.btn-submit').textContent = '추가하기';
  document.querySelector('.btn-submit').onclick = submitAdd;
  renderSummary();
  applyFilters();
}

function markDepositPaid(no, type) {
  const r = RAW.find(x => x.no === no);
  if (!r) return;
  if (type === 'deposit') r.depositPaid = true;
  if (type === 'balance') r.balancePaid = true;

  // 선금/잔금 둘 다 완료되면 전체 완료 처리
  if (r.depositPaid && r.balancePaid) r.paymentStatus = '완료';
  else if (r.depositPaid) r.paymentStatus = '선금완료';

  // localStorage 저장
  const added = loadAdded();
  const addedIdx = added.findIndex(x => x.no === no);
  if (addedIdx !== -1) { added[addedIdx] = r; saveAdded(added); }
  else {
    const overrides = JSON.parse(localStorage.getItem('giver_overrides') || '{}');
    overrides[no] = r;
    localStorage.setItem('giver_overrides', JSON.stringify(overrides));
  }

  // 모달 새로고침
  openModal(no);
  renderSummary();
  applyFilters();
}

function markUnpaid(no, type) {
  const r = RAW.find(x => x.no === no);
  if (!r) return;
  if (type === 'payment') r.paymentStatus = '미입금';
  if (type === 'share') r.shareStatus = '기타';

  const added = loadAdded();
  const idx = added.findIndex(x => x.no === no);
  if (idx !== -1) { added[idx] = r; saveAdded(added); }

  closeModal();
  renderSummary();
  applyFilters();
}

function markPaid(no, type) {
  const r = RAW.find(x => x.no === no);
  if (!r) return;
  if (type === 'payment') r.paymentStatus = '완료';
  if (type === 'share') r.shareStatus = '완료';

  // localStorage에 저장된 항목이면 업데이트
  const added = loadAdded();
  const idx = added.findIndex(x => x.no === no);
  if (idx !== -1) {
    added[idx] = r;
    saveAdded(added);
  }

  closeModal();
  renderSummary();
  applyFilters();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Events
document.getElementById('yearTabs').querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.getElementById('yearTabs').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeYear = tab.dataset.year;
    renderMonthFilter();
    applyFilters();
  });
});
document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value;
  applyFilters();
});
document.getElementById('monthFilter').addEventListener('change', e => {
  activeMonth = e.target.value;
  applyFilters();
});
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeFilter = tab.dataset.filter;
    applyFilters();
  });
});
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    if (sortCol === th.dataset.col) sortDir *= -1;
    else { sortCol = th.dataset.col; sortDir = 1; }
    applyFilters();
  });
});

// Load saved items from localStorage
const STORAGE_KEY = 'giver_added';
function loadAdded() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}
function saveAdded(items) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

// Merge saved items into RAW
loadAdded().forEach(r => RAW.push(r));

function openAddModal() {
  document.getElementById('addClient').value = '';
  document.getElementById('addFee').value = '';
  document.getElementById('addShare').value = '';
  document.getElementById('addPayment').value = '미입금';
  document.getElementById('addShareStatus').value = '해당없음';
  document.getElementById('addModalOverlay').classList.add('show');
}
function closeAddModal() {
  document.getElementById('addModalOverlay').classList.remove('show');
}
document.getElementById('addModalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeAddModal();
});

function submitAdd() {
  const client = document.getElementById('addClient').value.trim();
  if (!client) { alert('클라이언트명을 입력해줘!'); return; }
  const year = document.getElementById('addYear').value;
  const month = document.getElementById('addMonth').value;
  const fee = parseInt(document.getElementById('addFee').value) || 0;
  const shareAmount = parseInt(document.getElementById('addShare').value) || 0;
  const paymentStatus = document.getElementById('addPayment').value;
  const shareStatus = document.getElementById('addShareStatus').value;
  const deposit = parseInt(document.getElementById('addDeposit').value) || 0;
  const balance = parseInt(document.getElementById('addBalance').value) || 0;

  const maxNo = Math.max(...RAW.map(r => r.no));
  const newNo = maxNo + 1;

  const newItem = { no: newNo, client, month, fee, shareAmount, paymentStatus, shareStatus, taxInvoice: '-', note: '', _year: year, _isNew: true,
    ...(deposit || balance ? { deposit, balance, depositPaid: false, balancePaid: false } : {})
  };

  RAW.push(newItem);
  const added = loadAdded();
  added.push(newItem);
  saveAdded(added);

  closeAddModal();
  renderSummary();
  renderMonthFilter();
  applyFilters();
}

// getYear override to support _year field
const _getYearOrig = getYear;
getYear = function(no) {
  const r = RAW.find(x => x.no === no);
  if (r && r._year) return r._year;
  return _getYearOrig(no);
}



// ===== Init =====
loadAdded().forEach(r => RAW.push(r));

// 기존 항목 수정값 적용
const overrides = JSON.parse(localStorage.getItem('giver_overrides') || '{}');
Object.keys(overrides).forEach(no => {
  const idx = RAW.findIndex(x => x.no === parseInt(no));
  if (idx !== -1) Object.assign(RAW[idx], overrides[no]);
});

// 삭제된 항목 제거
const deleted = JSON.parse(localStorage.getItem('giver_deleted') || '[]');
deleted.forEach(no => {
  const idx = RAW.findIndex(x => x.no === no);
  if (idx !== -1) RAW.splice(idx, 1);
});

renderSummary();
renderMonthFilter();
applyFilters();
</script>
</body>
